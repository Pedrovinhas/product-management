# -- SPA: product-erp.pedrovinhas.com -----------------------------------------
# Serve os arquivos estaticos do Vue (baked in na imagem em /var/www/frontend).
# Toda rota desconhecida cai no index.html -- Vue Router cuida do roteamento.
server {
    listen 80;
    server_name product-erp.pedrovinhas.com;

    root /var/www/frontend;
    index index.html;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* { deny all; }
}

# -- API: api-product-erp.pedrovinhas.com -------------------------------------
# Roteia todas as requisicoes para o PHP-FPM (Laravel).
# Sem fallback para index.html -- rotas invalidas retornam 404 do Laravel.
server {
    listen 80;
    server_name api-product-erp.pedrovinhas.com;

    root /var/www/html/public;
    index index.php;
    charset utf-8;

    client_max_body_size 20M;

    location ^~ /api-docs {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /openapi.yaml {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* { deny all; }
}
