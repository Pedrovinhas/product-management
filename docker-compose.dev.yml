services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  
    container_name: product_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    networks:
      - product_network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:24-alpine
    container_name: product_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -lc "if [ ! -x node_modules/.bin/vite ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    networks:
      - product_network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: product_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Bind-mount overrides the baked-in public/ so asset changes are live
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - product_network
    depends_on:
      - app

  db:
    image: postgres:17-alpine
    container_name: product_db
    restart: unless-stopped
    ports:
      - "5432:5432"   # exposed locally so DB clients (DBeaver, TablePlus) can connect
    environment:
      POSTGRES_DB: ${DB_DATABASE:-product_db}
      POSTGRES_USER: ${DB_USERNAME:-product_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - product_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-product_user} -d ${DB_DATABASE:-product_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  product_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  frontend_node_modules:
    driver: local
