openapi: 3.0.3

info:
  title: Gerenciamento de Produtos API
  description: |
    API RESTful para gerenciamento de produtos com controle de estoque.

    ## Autenticação
    A API utiliza **Bearer Token** via Laravel Sanctum.
    Faça login em `POST /api/auth/login` para obter o token e inclua-o no header:
    ```
    Authorization: Bearer <token>
    ```

    ## Envelope de resposta
    Todas as respostas seguem o padrão:
    ```json
    {
      "data": <payload>,
      "message": "Descrição da operação.",
      "errors": []
    }
    ```

    ## Paginação
    Endpoints de listagem retornam o payload de paginação dentro de `data`:
    ```json
    {
      "data": {
        "data": [...],
        "links": { "first": "...", "last": "...", "prev": null, "next": null },
        "meta": { "current_page": 1, "last_page": 1, "per_page": 15, "total": 3, ... }
      },
      "message": "...",
      "errors": []
    }
    ```
  version: 1.0.0
  contact:
    name: Equipe de Desenvolvimento

servers:
  - url: /
    description: Mesmo host da interface Swagger (evita CORS em dev)

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Autenticação de usuários
  - name: User
    description: Dados do usuário autenticado
  - name: Products
    description: CRUD de produtos
  - name: Stock History
    description: Histórico de movimentações de estoque

paths:
  # ──────────────────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────────────────
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Autentica o usuário e retorna um Bearer token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: admin@example.com
              password: password
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Invalid credentials.
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          description: Muitas tentativas de login (throttle)

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Invalida o token atual do usuário.
      responses:
        '200':
          description: Logout realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyDataResponse'
              example:
                data: null
                message: Logged out successfully.
                errors: []
        '401':
          $ref: '#/components/responses/Unauthenticated'

  # ──────────────────────────────────────────────────────────
  # USER
  # ──────────────────────────────────────────────────────────
  /api/user:
    get:
      tags: [User]
      summary: Usuário autenticado
      description: Retorna os dados do usuário dono do token.
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  # ──────────────────────────────────────────────────────────
  # PRODUCTS
  # ──────────────────────────────────────────────────────────
  /api/products:
    get:
      tags: [Products]
      summary: Listar produtos (paginado)
      description: Retorna a lista paginada de produtos. Suporta filtros por nome, preço e estoque.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: search
          in: query
          description: Filtro por nome (LIKE)
          schema:
            type: string
          example: "camiseta"
        - name: min_price
          in: query
          description: Preço mínimo
          schema:
            type: number
            format: float
            minimum: 0
          example: 10.00
        - name: max_price
          in: query
          description: Preço máximo
          schema:
            type: number
            format: float
            minimum: 0
          example: 100.00
        - name: min_stock
          in: query
          description: Estoque mínimo
          schema:
            type: integer
            minimum: 0
          example: 5
        - name: max_stock
          in: query
          description: Estoque máximo
          schema:
            type: integer
            minimum: 0
          example: 500
      responses:
        '200':
          description: Lista de produtos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'

    post:
      tags: [Products]
      summary: Criar produto
      description: |
        Cria um novo produto. A criação registra automaticamente uma entrada
        no histórico de estoque com o `stock_quantity` informado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
            example:
              name: Camiseta Polo
              description: Camiseta polo masculina tamanho M
              price: 79.90
              stock_quantity: 50
      responses:
        '201':
          description: Produto criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductItemResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Exibir produto
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Produto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductItemResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Products]
      summary: Atualizar produto
      description: |
        Atualiza os dados do produto. Se `stock_quantity` for diferente do valor atual,
        um registro de ajuste é criado no histórico de estoque.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
            example:
              name: Camiseta Polo
              description: Camiseta polo masculina tamanho M — edição limitada
              price: 89.90
              stock_quantity: 45
      responses:
        '200':
          description: Produto atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductItemResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Products]
      summary: Remover produto (soft delete)
      description: Realiza soft delete do produto. O registro continua no banco com `deleted_at` preenchido.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Produto removido com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyDataResponse'
              example:
                data: null
                message: Product deleted successfully.
                errors: []
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────────────────
  # STOCK HISTORY
  # ──────────────────────────────────────────────────────────
  /api/products/{id}/stock-history:
    get:
      tags: [Stock History]
      summary: Histórico de estoque do produto
      description: Retorna o histórico paginado de movimentações de estoque de um produto.
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Histórico de estoque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockHistoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'

# ──────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token obtido em POST /api/auth/login

  # ── Parameters ──────────────────────────────────────────────
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: ID do recurso
      schema:
        type: integer
        minimum: 1
      example: 1

    PageParam:
      name: page
      in: query
      description: Número da página (padrão 1, 15 itens por página)
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1

  # ── Responses ────────────────────────────────────────────────
  responses:
    Unauthenticated:
      description: Token ausente ou inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Unauthenticated.

    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: No query results for model [App\Models\Product] 1

    ValidationError:
      description: Erro de validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

  # ── Schemas ──────────────────────────────────────────────────
  schemas:

    # ── Auth ──────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token:
              type: string
              description: Bearer token para uso nas requisições autenticadas
              example: "1|abc123xyz..."
            user:
              $ref: '#/components/schemas/User'
        message:
          type: string
          example: Login successful.
        errors:
          type: array
          items: {}
          example: []

    # ── User ──────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Admin
        email:
          type: string
          format: email
          example: admin@example.com
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00.000000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00.000000Z"

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Product ───────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          maxLength: 255
          example: Camiseta Polo
        description:
          type: string
          nullable: true
          maxLength: 2000
          example: Camiseta polo masculina tamanho M
        price:
          type: number
          format: float
          example: 79.90
        stock_quantity:
          type: integer
          minimum: 0
          example: 50
        deleted_at:
          type: string
          format: date-time
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00.000000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00.000000Z"

    ProductRequest:
      type: object
      required: [name, price, stock_quantity]
      properties:
        name:
          type: string
          maxLength: 255
          example: Camiseta Polo
        description:
          type: string
          nullable: true
          maxLength: 2000
          example: Camiseta polo masculina tamanho M
        price:
          type: number
          format: float
          minimum: 0.01
          example: 79.90
        stock_quantity:
          type: integer
          minimum: 0
          example: 50

    ProductItemResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Product'
        message:
          type: string
          example: Product created successfully.
        errors:
          type: array
          items: {}
          example: []

    ProductListResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PaginatedProducts'
        message:
          type: string
          example: Products retrieved successfully.
        errors:
          type: array
          items: {}
          example: []

    PaginatedProducts:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ── Stock History ─────────────────────────────────────────
    StockHistoryEntry:
      type: object
      properties:
        id:
          type: integer
          example: 1
        product_id:
          type: integer
          example: 1
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: Admin
        type:
          type: string
          enum: [entrada, saída, ajuste]
          description: |
            Tipo da movimentação:
            - `entrada` — criação ou reposição de estoque
            - `saída` — venda ou baixa manual
            - `ajuste` — correção manual via edição do produto
          example: entrada
        quantity:
          type: integer
          description: Quantidade movimentada (sempre positivo)
          example: 50
        previous_stock:
          type: integer
          description: Estoque antes da movimentação
          example: 0
        current_stock:
          type: integer
          description: Estoque após a movimentação
          example: 50
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00.000000Z"

    StockHistoryListResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PaginatedStockHistory'
        message:
          type: string
          example: Stock history retrieved successfully.
        errors:
          type: array
          items: {}
          example: []

    PaginatedStockHistory:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StockHistoryEntry'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ── Pagination ────────────────────────────────────────────
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
          example: "http://localhost:8000/api/products?page=1"
        last:
          type: string
          nullable: true
          example: "http://localhost:8000/api/products?page=1"
        prev:
          type: string
          nullable: true
          example: null
        next:
          type: string
          nullable: true
          example: null

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        from:
          type: integer
          nullable: true
          example: 1
        last_page:
          type: integer
          example: 1
        path:
          type: string
          example: "http://localhost:8000/api/products"
        per_page:
          type: integer
          example: 15
        to:
          type: integer
          nullable: true
          example: 3
        total:
          type: integer
          example: 3

    # ── Generic ───────────────────────────────────────────────
    EmptyDataResponse:
      type: object
      properties:
        data:
          nullable: true
          example: null
        message:
          type: string
        errors:
          type: array
          items: {}
          example: []

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: The name field is required.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            name: ["The name field is required."]
            price: ["The price field must be at least 0.01."]
