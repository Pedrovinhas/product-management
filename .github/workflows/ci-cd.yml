name: CI / CD

on:
  push:
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Code quality + tests — runs on every push / PR
  # ─────────────────────────────────────────────────────────────────────────
  ci:
    name: Pint · Larastan · PHPUnit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, pdo_sqlite, bcmath, zip, intl, pcntl, opcache
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Copy .env for testing
        run: cp .env.example .env && php artisan key:generate

      - name: Laravel Pint (lint check)
        run: ./vendor/bin/pint --test

      - name: Larastan (static analysis)
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: PHPUnit (tests)
        run: ./vendor/bin/phpunit

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Front-end quality + build
  # ─────────────────────────────────────────────────────────────────────────
  ci-frontend:
    name: Frontend · Typecheck · Build
    runs-on: ubuntu-latest
    env:
      # Prefer GitHub Repository Variable: VITE_API_BASE_URL (ex.: https://api.seu-dominio.com)
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost/api' }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Build Docker images and push to Docker Hub — only on main
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    needs: [ci, ci-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- App image (PHP-FPM) ---
      - name: Docker metadata — app
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/product-app
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Nginx image (static assets baked in) ---
      - name: Docker metadata — nginx
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/product-nginx
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: web
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy to VPS — runs after images are pushed
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Pull updated images from Docker Hub
            docker compose -f docker-compose.yml pull

            # Restart containers with zero-downtime (removes old orphan containers)
            docker compose -f docker-compose.yml up -d --remove-orphans

            # Run pending migrations (--force skips the production confirmation prompt)
            docker compose -f docker-compose.yml exec -T app php artisan migrate --force

            # Clean up dangling images to free disk space
            docker image prune -f
